<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2541B"/>
      <stop offset="1" stop-color="#FF8A4C"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square app tile -->
  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Subtle activity ring (echoes the dashboard progress rings) -->
  <circle cx="256" cy="256" r="186" fill="none" stroke="#FFFFFF" stroke-opacity="0.16"
          stroke-width="14" stroke-linecap="round"
          stroke-dasharray="900 268" transform="rotate(-118 256 256)"/>

  <!-- Mark: a runner that also reads as the letter "A" -->
  <g fill="none" stroke="#FFFFFF" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <path d="M256 178 L184 372"/>   <!-- left leg -->
    <path d="M256 178 L328 372"/>   <!-- right leg -->
    <path d="M206 306 L306 306"/>   <!-- crossbar -->
  </g>
  <circle cx="256" cy="150" r="27" fill="#FFFFFF"/> <!-- head / apex node -->
</svg>
